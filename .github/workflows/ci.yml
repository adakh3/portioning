name: CI

# Runs the test suites in the cloud, so a regression is caught beyond the local
# pre-commit hook (which is bypassable and only runs on one machine). With
# multiple feature branches in flight, this is what keeps main green.
#
# Scope (for now): backend (Django) + frontend (Vitest) unit/integration tests,
# on every push to main AND every PR. The slower, flakier Playwright E2E layer
# is intentionally NOT wired up here yet — see the automated-testing branch /
# REL-359 — and will be added as a PR-only job once we decide to adopt it.
#
# NOTE on direct pushes to main: CI reports status but cannot *block* a push
# that has already landed. To actually stop a broken commit from deploying,
# either merge via PRs with this workflow as a required check, or gate the
# DigitalOcean deploy on CI success. See REL-360.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# A newer push to the same branch/PR cancels the older in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend tests (Django)
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ci-insecure-test-key
      DEBUG: "True" # avoids the prod ALLOWED_HOSTS guard; tests use sqlite
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: pip install -r backend/requirements.txt
      - name: Run tests
        working-directory: backend
        run: python manage.py test --parallel --verbosity=1

  frontend:
    name: Frontend tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Run tests
        working-directory: frontend
        run: npm run test:run
